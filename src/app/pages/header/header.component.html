<ion-header >
  <div class="header-align">
    <ion-img class="img_size"
    src="assets/images/header.svg"
    ></ion-img>
    <ion-buttons slot="end" (click)="openMenu()">
      <ion-icon name="menu-outline"></ion-icon>
    </ion-buttons> 
  </div>
</ion-header>

<ion-menu menuId="main-menu" contentId="main-content" side="end" type="overlay">
  <ion-header>
    <ion-toolbar>
      <ion-title>Main Menu</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content mode="md">
    <ion-list>
      <ion-item routerLink="/tabs/tab1">Home</ion-item>
      <ion-item routerLink="/tabs/tab2">History</ion-item>
      <ion-item routerLink="/tabs/tab4">Profile</ion-item>
      <ion-item routerLink="/tabs/tab5">Settings</ion-item>
    </ion-list>
  </ion-content>
</ion-menu>
