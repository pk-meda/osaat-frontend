<ion-header>
  <div class="header-align">
    <ion-img class="img_size" src="assets/images/header.svg"></ion-img>
    <ion-buttons slot="end" (click)="openMenu()">
      <ion-icon name="menu-outline"></ion-icon>
    </ion-buttons> 
  </div>
</ion-header>

<ion-menu menuId="main-menu" contentId="main-content" side="end" type="overlay">
  <ion-header>
    <ion-toolbar>
      <ion-title>Main Menu</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content mode="md">
    <ion-list>
      <!-- Maps to your layout's home/school register component -->
      <ion-item button="true" routerLink="/layout/school-register" (click)="openMenu()">Home</ion-item>
      
      <!-- Maps to your spectacle history component -->
      <ion-item button="true" routerLink="/layout/spectacle-wearing" (click)="openMenu()">History</ion-item>
      
      <!-- Maps to your profile component -->
      <ion-item button="true" routerLink="/layout/profile" (click)="openMenu()">Profile</ion-item>
      
      <!-- Maps to your way-forward component 
      <ion-item button="true" routerLink="/layout/way-forward" (click)="openMenu()">Settings</ion-item>-->
    </ion-list>
  </ion-content>
</ion-menu>
